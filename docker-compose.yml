services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    command: sh -c "alembic upgrade head && uvicorn backend.app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://rag:rag@postgres:5432/rag
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    command: sh -c "alembic upgrade head && celery -A backend.app.worker.celery_app:celery_app worker --loglevel=info"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://rag:rag@postgres:5432/rag
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis

  frontend:
    build: .
    command: streamlit run frontend/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    environment:
      API_URL: http://api:8000/api/v1
    env_file:
      - .env
    ports:
      - "8501:8501"
    depends_on:
      - api
    volumes:
      - .:/app

volumes:
  postgres_data:
  redis_data:
